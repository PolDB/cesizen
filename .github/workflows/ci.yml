name: CI CesiZen

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  # ─────────────────────────────────────────
  # Job 1 : Tests backend (pytest)
  # ─────────────────────────────────────────
  backend-tests:
    name: Tests backend (pytest)
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: cesizen_test
          MYSQL_USER: cesizen
          MYSQL_PASSWORD: cesizen
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Configuration Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: back/requirements.txt

      - name: Installation des dépendances backend
        working-directory: back
        run: pip install -r requirements.txt

      - name: Lancement des tests pytest
        working-directory: back
        env:
          DATABASE_URL: mysql+pymysql://cesizen:cesizen@127.0.0.1:3306/cesizen_test
          SECRET_KEY: test_secret_key_ci
          ENVIRONMENT: test
        run: pytest tests/ -v --tb=short

  # ─────────────────────────────────────────
  # Job 2 : Tests E2E (Playwright)
  # ─────────────────────────────────────────
  e2e-tests:
    name: Tests E2E (Playwright)
    runs-on: ubuntu-latest
    needs: backend-tests

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: cesizen_test
          MYSQL_USER: cesizen
          MYSQL_PASSWORD: cesizen
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Configuration Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: back/requirements.txt

      - name: Installation des dépendances backend
        working-directory: back
        run: pip install -r requirements.txt

      - name: Démarrage de l'API FastAPI
        working-directory: back
        env:
          DATABASE_URL: mysql+pymysql://cesizen:cesizen@127.0.0.1:3306/cesizen_test
          SECRET_KEY: test_secret_key_ci
          ENVIRONMENT: test
        run: |
          uvicorn main:app --host 0.0.0.0 --port 8000 &
          sleep 5

      - name: Configuration Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: front/package-lock.json

      - name: Installation des dépendances frontend
        working-directory: front
        run: npm ci

      - name: Installation des navigateurs Playwright
        working-directory: front
        run: npx playwright install --with-deps chromium

      - name: Lancement des tests Playwright
        working-directory: front
        env:
          BASE_URL: http://localhost:8000
        run: npx playwright test --reporter=list

      - name: Upload du rapport Playwright (en cas d'échec)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: front/playwright-report/
          retention-days: 7
